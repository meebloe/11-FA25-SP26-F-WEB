<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Pantry</title>
    <style>
        /* Import Montserrat font */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FFFFFF;
            color: #000000;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Header section shared across all pages */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            border-bottom: 2px solid #ccc;
        }

        header img {
            height: 300px;
        }

        header h1 {
            font-size: 3.5em;
            margin: 0 auto;
            text-align: center;
            flex-grow: 1;
            cursor: pointer;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.8em;
            color: #333;
            background-color: #f4f4f4;
            padding: 10px;
            text-align: center;
            border-top: 1px solid #ccc;
        }

        /* Buttons */
        button {
            background-color: #A60F2D;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #CA1237;
        }

        /* Centered content */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
        }

        /* Forms */
        form {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }

        label {
            display: inline-block;
            width: 150px;
            text-align: right;
            margin-right: 10px;
        }

        input[type="text"], input[type="email"], input[type="password"] {
            padding: 8px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }
        header img {
            height: 80px;
        }
        header h1 {
            margin-left: 15px;
            cursor: pointer;
        }
        .header-buttons {
            display: flex;
            gap: 15px;
        }
        .header-buttons button {
            padding: 10px 15px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #f5f5f5;
            color: black;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .header-buttons button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center;">
            <img src="/images/cougar_mock-up.png" alt="Logo for WSU">
            <h1 onclick="window.location.href='/'">Voiland Food Pantry</h1>
        </div>
        <!-- New Dashboard button -->
        <div class="header-buttons">
            <button onclick="window.location.href='/admin/dashboard'">Dashboard</button>
        </div>
    </header>

    <div class="main-content">

        <h2>Introduction to Services</h2>
        <h3>Providing Free Food to All Students</h3>
        <p>Dana 107</p>
        <p>Drop off donations to the boxes in: Sloan 112, Dana 110, or Dana 15 (the fiz)</p>

        <h2>Hours of Operation</h2>
        <h3>Monday-Friday 3:00pm-5:00pm</h3>

        <div>
            <h2>Portals</h2>
            <button onclick="window.location.href='/login'">Student Portal</button>
            <button onclick="window.location.href='/admin-login'">Staff/Admin Portal</button>
            <button onclick="window.location.href='/volunteer/login'">Volunteer Portal</button>
        </div>

    </div> <!-- closes .main-content -->

</body>
</html>
