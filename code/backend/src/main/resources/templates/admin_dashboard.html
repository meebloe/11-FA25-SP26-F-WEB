<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        /* Header styling consistent with home page */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }
        header img {
            height: 80px;
        }
        header h1 {
            margin-left: 15px;
            cursor: pointer;
        }

        .logout-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Main content */
        .main-content {
            max-width: 900px;
            margin: 120px auto 60px auto; /* added bottom margin */
            padding: 0 20px;
            text-align: center;
        }

        .welcome-msg {
            font-size: 1.3em;
            margin-bottom: 40px;
        }

        /* Dashboard buttons */
        .dashboard-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .dashboard-buttons button,
        .logout-section button {
            padding: 15px 25px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #8b0000; /* unified red */
            color: white;
            cursor: pointer;
            transition: background-color .2s ease;
        }

        .dashboard-buttons button:hover,
        .logout-section button:hover {
            background-color: #a30000; /* hover red */
        }

        /* Admin list box */
        .current-admins {
            background-color: #fafafa;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-top: 40px;
            margin-bottom: 80px; /* extra bottom spacing */
        }

        .current-admins ul {
            list-style: none;
            padding: 0;
        }
        .current-admins li {
            padding: 8px 0;
            font-size: 1.1em;
        }
    </style>
</head>

<body>

<header>
    <div style="display: flex; align-items: center;">
        <img src="/images/cougar_mock-up.png" alt="WSU Logo">
        <h1 onclick="window.location.href='/'">Voiland Food Pantry</h1>
    </div>

    <div class="logout-section">
        <span>Logged in as: <span sec:authentication="name"></span></span>
        <form action="/logout" method="post">
            <button type="submit">Logout</button>
        </form>
    </div>
</header>

<div class="main-content">

    <div class="welcome-msg">
        Welcome, <span sec:authentication="name"></span>!  
        You now have full access to the Admin Dashboard.
    </div>

    <div class="dashboard-buttons">
        <button onclick="window.location.href='/inventory'">Inventory</button>
        <button onclick="window.location.href='/report'">Inventory Report</button>
        <button onclick="window.location.href='/admin/volunteer-report'">Volunteer Hours Report</button>
        <button onclick="window.location.href='/admin/volunteers'">Manage Volunteer Accounts</button>
        <button onclick="window.location.href='/admin/manage-admins'">Manage Admin Accounts</button>
        <button onclick="window.location.href='/'">Back to Home</button>
    </div>

    <div class="current-admins">
        <h2>Current Admin Users</h2>
        <ul>
            <li th:each="admin : ${admins}" th:text="${admin.username}"></li>
        </ul>
    </div>

</div>

</body>
</html>
