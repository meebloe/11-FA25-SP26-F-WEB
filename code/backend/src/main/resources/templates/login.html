<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign-In - Food Pantry</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <img src="/images/cougar_mock-up.png" alt="Logo for WSU">
    <h1 onclick="window.location.href='/'">Voiland Food Pantry</h1>
</header>

<div class="main-content">
    <!-- Card Login Popup -->
    <div id="loginPopup" style="position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); 
        background-color: white; padding: 40px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.5); 
        z-index: 1000; text-align: center; min-width: 400px; border-radius: 8px;">
        <h2>Student Sign-In</h2>
        <p style="font-size: 18px; color: #666; margin: 20px 0;">Please swipe your Cougar Card</p>
        <form id="loginForm" method="POST" action="/login">
            <input type="text" id="identifier" name="identifier" autofocus style="opacity: 0; width: 0; height: 0; padding: 0; border: none; position: absolute;">
        </form>
        <button type="button" onclick="showGuestLogin()" style="margin-top: 30px; padding: 12px 20px; background-color: #A60F2D; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: underline;">
            Don't have your Cougar Card? Click here.
        </button>
    </div>

    <!-- Guest Login Popup -->
    <div id="guestLoginPopup" style="display: none; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); 
        background-color: white; padding: 40px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.5); 
        z-index: 1000; text-align: center; min-width: 400px; border-radius: 8px;">
        <h2>Guest Sign-In</h2>
        <p style="font-size: 16px; color: #666; margin: 20px 0;">Please enter your information</p>
        <form id="guestLoginForm" method="POST" action="/guest-login">
            <div style="margin: 15px 0;">
                <label for="guestYear" style="display: block; margin-bottom: 5px; font-weight: bold;">Year:</label>
                <select id="guestYear" name="year" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px;">
                    <option value="">-- Select Year --</option>
                    <option value="Freshman">Freshman</option>
                    <option value="Sophomore">Sophomore</option>
                    <option value="Junior">Junior</option>
                    <option value="Senior">Senior</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div style="margin: 15px 0;">
                <label for="guestMajor" style="display: block; margin-bottom: 5px; font-weight: bold;">Major:</label>
                <input type="text" id="guestMajor" name="major" placeholder="e.g., Computer Science" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <button type="submit" style="margin-top: 20px; margin-right: 10px; padding: 10px 20px; background-color: #A60F2D; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">
                Continue as Guest
            </button>
            <button type="button" onclick="hideGuestLogin()" style="margin-top: 20px; padding: 10px 20px; background-color: #666; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">
                Back to Card Login
            </button>
        </form>
    </div>

    <div class="back-btn-wrapper" style="position: fixed; bottom: 20px; left: 20px;">
        <button onclick="window.location.href='/'">Back to Home</button>
    </div>
</div>

<section role="region" aria-label="Instructions" style="background-color: #f0f4f8; padding: 12px 20px; margin: 20px; border-left: 4px solid #A60F2D; border-radius: 4px; position: fixed; bottom: 80px; left: 0; right: 0; max-width: 500px; margin-left: auto; margin-right: auto;">
    <p style="margin: 0; font-size: 16px; color: #333;"><strong>How to use:</strong> Swipe your Cougar Card to check in and begin your visit.</p>
</section>

<script>
let inputDebounceTimer;

function handleLogin() {
    const identifier = document.getElementById('identifier').value.trim();
    if (!identifier) return;

    // Debug statement
    console.log('DEBUG: Identifier = ' + identifier);
    
    // Submit the form
    document.getElementById('loginForm').submit();

        // Clear the input field for next swipe
    document.getElementById('identifier').value = '';
}

function showGuestLogin() {
    document.getElementById('loginPopup').style.display = 'none';
    document.getElementById('guestLoginPopup').style.display = 'block';
    document.getElementById('guestYear').focus();
}

function hideGuestLogin() {
    document.getElementById('guestLoginPopup').style.display = 'none';
    document.getElementById('loginPopup').style.display = 'block';
    document.getElementById('identifier').focus();
}

document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('identifier');
    input.focus();
    
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            clearTimeout(inputDebounceTimer);
            handleLogin();
        }
    });
    
    input.addEventListener('input', () => {
        // Clear the previous debounce timer
        clearTimeout(inputDebounceTimer);
        
        // Set a new timer - submit only after 500ms of no input
        inputDebounceTimer = setTimeout(() => {
            if (input.value.trim().length > 0) {
                handleLogin();
            }
        }, 500);
    });
});
</script>

<footer></footer>
</body>
</html>
