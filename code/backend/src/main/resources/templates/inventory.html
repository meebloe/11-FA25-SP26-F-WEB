<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<header>
    <img src="/images/cougar_mock-up.png" alt="Logo for WSU">
    <h1 onclick="window.location.href='/'">Voiland Food Pantry</h1>
</header>

<div class="main-content">
    <h2>Pantry Inventory</h2>

    <div class="inventory-toolbar">
        <form method="get" action="/inventory" style="display:flex; gap:10px; flex-wrap: wrap;">
            <input type="text" name="search" placeholder="Search by product name" th:value="${search}">
            <button type="submit">Search</button>
            <button type="button" onclick="window.location.href='/inventory'">Clear</button>
            <button type="button" onclick="window.location.href='/inventory'">View All</button>
        </form>
    </div>

    <table class="inventory-table">
        <tr>
            <th>ID</th>
            <th>UPC</th>
            <th>Product Name</th>
            <th>Net Weight (oz)</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        <tr th:each="item : ${inventory}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.upc}"></td>
            <td th:text="${item.productName}"></td>
            <td th:text="${item.netWeight}"></td>
            <td th:text="${item.quantity}"></td>
            <td>
                <button type="button" class="edit-btn" onclick="editRow(this)">Edit</button>
                <button type="button" class="delete-btn" onclick="deleteRow(this)">Delete</button>
            </td>
        </tr>
    </table>

    <button type="button" onclick="openCheckoutPopup()" style="margin-left: 10px;">Checkout</button>
    <button type="button" onclick="openScanInPopup()" style="margin-left: 10px;">Scan In</button>

    <div class="back-btn-wrapper">
        <button onclick="window.location.href='/admin/dashboard'">Back to Dashboard</button>
    </div>
</div>

<!-- Checkout Popup -->
<div id="checkoutPopup" style="display: none; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); 
    background-color: white; padding: 20px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 1000;">
    <h3>Checkout Item</h3>
    <form id="checkoutForm" onsubmit="handleCheckout(event)">
        <label>Product Code:</label><br>
        <input type="text" id="productCode" required><br><br>
        <button type="button" onclick="closeCheckoutPopup()">Cancel</button>
    </form>
</div>

<!-- Scan In Code Popup -->
<div id="scanInCodePopup" style="display: none; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); 
    background-color: white; padding: 20px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 1000;">
    <h3>Scan In Item</h3>
    <label>Product Code:</label><br>
    <input type="text" id="scanInCode" placeholder="Scan or type UPC"><br><br>
    <button type="button" onclick="closeScanInPopup()">Cancel</button>
</div>

<!-- Scan In Quantity Popup (for existing items) -->
<div id="scanInQuantityPopup" style="display: none; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); 
    background-color: white; padding: 20px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 1000;">
    <h3>Add Quantity</h3>
    <p>Product: <span id="existingProductName" style="font-weight: bold;"></span></p>
    <label>Quantity to Add:</label><br>
    <input type="number" id="quantityToAdd" min="1" value="1" required><br><br>
    <button type="button" onclick="submitQuantityAdd()">Submit</button>
    <button type="button" onclick="closeScanInPopup()">Cancel</button>
</div>

<!-- Scan In New Item Popup (for new items) -->
<div id="scanInNewItemPopup" style="display: none; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); 
    background-color: white; padding: 20px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 1000;">
    <h3>Create New Item</h3>
    <label>Product Code (UPC):</label><br>
    <input type="text" id="newItemCode" readonly><br><br>
    <label>Product Name:</label><br>
    <input type="text" id="newItemProductName" required><br><br>
    <label>Net Weight (oz):</label><br>
    <input type="number" id="newItemNetWeight" step="0.01" required><br><br>
    <label>Quantity:</label><br>
    <input type="number" id="newItemQuantity" min="1" value="1" required><br><br>
    <button type="button" onclick="submitNewItem()">Submit</button>
    <button type="button" onclick="closeScanInPopup()">Cancel</button>
</div>

<script>
/* --- Edit Row Function --- */
function editRow(editButton) {
    const row = editButton.closest('tr');
    const cells = row.querySelectorAll('td');
    const deleteLink = row.querySelector('.delete-btn');
    
    // Store original values for potential cancel
    const originalValues = [];
    
    // Convert cells to editable inputs (skip ID column at index 0)
    cells.forEach((cell, index) => {
        if (index === 0 || index === cells.length - 1) return; // Skip ID and Actions columns
        
        originalValues[index] = cell.textContent.trim();
        const input = document.createElement('input');
        input.type = 'text';
        input.value = cell.textContent.trim();
        input.className = 'edit-input';
        cell.textContent = '';
        cell.appendChild(input);
    });
    
    // Replace Edit and Delete buttons with Submit and Cancel buttons
    const actionCell = cells[cells.length - 1];
    actionCell.innerHTML = `
        <button type="button" class="submit-btn" onclick="submitEdit(this)">Submit</button>
        <button type="button" class="cancel-btn" onclick="cancelEdit(this)">Cancel</button>
    `;
}

function cancelEdit(cancelButton) {
    const row = cancelButton.closest('tr');
    location.reload(); // Simple reset by reloading the page
}

function submitEdit(submitButton) {
    const row = submitButton.closest('tr');
    const cells = row.querySelectorAll('td');
    
    // Get ID from first cell
    const id = cells[0].textContent.trim();
    
    // Get input values from cells 1-4
    const upc = cells[1].querySelector('input').value.trim();
    const productName = cells[2].querySelector('input').value.trim();
    const netWeight = cells[3].querySelector('input').value.trim();
    const quantity = cells[4].querySelector('input').value.trim();
    
    // Validation
    if (!upc || !productName || !netWeight || !quantity) {
        alert('All fields are required');
        return;
    }
    
    // Send update request to backend
    fetch(`/inventory/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            id: id,
            upc: upc,
            productName: productName,
            netWeight: parseFloat(netWeight),
            quantity: parseInt(quantity)
        })
    })
    .then(async resp => {
        if (resp.ok) {
            window.location.reload();
        } else {
            const err = await resp.json().catch(() => null);
            alert('Update failed: ' + (err?.message || 'Unknown error'));
        }
    })
    .catch(e => alert('Update request failed'));
}

function deleteRow(deleteButton) {
    const row = deleteButton.closest('tr');
    const cells = row.querySelectorAll('td');
    const id = cells[0].textContent.trim();
    
    if (confirm('Are you sure you want to delete this item?')) {
        window.location.href = `/inventory/delete/${id}`;
    }
}

/* --- Checkout Functions --- */
function openCheckoutPopup() {
    const popup = document.getElementById('checkoutPopup');
    const input = document.getElementById('productCode');
    popup.style.display = 'block';
    input.focus();
    input.select();
    if (window.checkoutDebounce) clearTimeout(window.checkoutDebounce);
}

function closeCheckoutPopup() {
    document.getElementById('checkoutPopup').style.display = 'none';
    document.getElementById('productCode').value = '';
    if (window.checkoutDebounce) clearTimeout(window.checkoutDebounce);
}

function submitCheckout() {
    const code = document.getElementById('productCode').value.trim();
    if (!code) return;
    fetch('/inventory/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
    })
    .then(async resp => {
        if (resp.ok) {
            const data = await resp.json();
            document.querySelectorAll('table tr').forEach((row, i) => {
                if (i === 0) return;
                const cells = row.children;
                if (cells[1].textContent.trim() === code) {
                    cells[4].textContent = data.newQuantity;
                }
            });
            closeCheckoutPopup();
        } else {
            const err = await resp.json().catch(() => null);
            alert('Checkout failed: ' + (err?.message || 'Unknown error'));
        }
    }).catch(e => alert('Checkout request failed'));
}

function handleCheckout(e) {
    e.preventDefault();
    submitCheckout();
}

document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('productCode');
    if (!input) return;
    input.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); submitCheckout(); }});
    input.addEventListener('input', function() {
        if (window.checkoutDebounce) clearTimeout(window.checkoutDebounce);
        if (!this.value) return;
        window.checkoutDebounce = setTimeout(submitCheckout, 250);
    });
});

/* --- Scan In Functions --- */
function openScanInPopup() {
    const popup = document.getElementById('scanInCodePopup');
    const input = document.getElementById('scanInCode');
    popup.style.display = 'block';
    input.value = '';
    input.focus();
}

function closeScanInPopup() {
    document.getElementById('scanInCodePopup').style.display = 'none';
    document.getElementById('scanInQuantityPopup').style.display = 'none';
    document.getElementById('scanInNewItemPopup').style.display = 'none';
    document.getElementById('scanInCode').value = '';
    document.getElementById('quantityToAdd').value = '1';
    document.getElementById('newItemCode').value = '';
    document.getElementById('newItemProductName').value = '';
    document.getElementById('newItemNetWeight').value = '';
    document.getElementById('newItemQuantity').value = '1';
}

function checkBarcode() {
    const code = document.getElementById('scanInCode').value.trim();
    if (!code) {
        alert('Please enter a product code');
        return;
    }

    // Call barcodecheck endpoint
    fetch('/inventory/barcodecheck', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
    })
    .then(async resp => {
        if (resp.ok) {
            // Item found - show quantity input popup
            const data = await resp.json();
            document.getElementById('existingProductName').textContent = data.productName;
            document.getElementById('scanInCodePopup').style.display = 'none';
            document.getElementById('scanInQuantityPopup').style.display = 'block';
            document.getElementById('quantityToAdd').focus();
        } else if (resp.status === 404) {
            // Item not found - show new item creation popup
            document.getElementById('newItemCode').value = code;
            document.getElementById('scanInCodePopup').style.display = 'none';
            document.getElementById('scanInNewItemPopup').style.display = 'block';
            document.getElementById('newItemProductName').focus();
        } else {
            alert('Error checking barcode');
        }
    })
    .catch(e => {
        alert('Request failed: ' + e.message);
    });
}

function submitQuantityAdd() {
    const code = document.getElementById('scanInCode').value.trim();
    const quantity = parseInt(document.getElementById('quantityToAdd').value);
    
    if (!code || quantity < 1) {
        alert('Invalid input');
        return;
    }

    fetch('/inventory/scanin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, quantity })
    })
    .then(async resp => {
        if (resp.ok || resp.status === 201) {
            window.location.reload();
        } else {
            const err = await resp.json().catch(() => null);
            alert('Scan in failed: ' + (err?.message || 'Unknown error'));
        }
    })
    .catch(e => alert('Request failed'));
}

function submitNewItem() {
    const code = document.getElementById('newItemCode').value.trim();
    const productName = document.getElementById('newItemProductName').value.trim();
    const netWeight = parseFloat(document.getElementById('newItemNetWeight').value);
    const quantity = parseInt(document.getElementById('newItemQuantity').value);

    if (!code || !productName || !netWeight || quantity < 1) {
        alert('Please fill in all fields');
        return;
    }

    fetch('/inventory/scanin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, productName, netWeight, quantity })
    })
    .then(async resp => {
        if (resp.ok || resp.status === 201) {
            window.location.reload();
        } else {
            const err = await resp.json().catch(() => null);
            alert('Create item failed: ' + (err?.message || 'Unknown error'));
        }
    })
    .catch(e => alert('Request failed'));
}

document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('scanInCode');
    if (input) {
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                clearTimeout(window.scanInDebounce);
                checkBarcode();
            }
        });
        
        input.addEventListener('input', () => {
            // Clear the previous debounce timer
            clearTimeout(window.scanInDebounce);
            
            // Set a new timer - auto-submit after 500ms of no input
            window.scanInDebounce = setTimeout(() => {
                if (input.value.trim().length > 0) {
                    checkBarcode();
                }
            }, 500);
        });
    }
});
</script>

<footer></footer>
</body>
</html>
