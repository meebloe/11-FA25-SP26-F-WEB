<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard - Voiland Food Pantry</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        /* Header styling consistent with Admin/Home page */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }
        header img {
            height: 80px;
        }
        header h1 {
            margin-left: 15px;
            cursor: pointer;
        }

        .logout-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Main content */
        .main-content {
            max-width: 900px;
            margin: 120px auto 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .welcome-msg {
            font-size: 1.3em;
            margin-bottom: 40px;
        }

        /* Dashboard buttons style matched to Admin */
        .dashboard-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .dashboard-buttons button,
        .logout-section button {
            padding: 15px 25px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #8b0000; /* Unified Crimson */
            color: white;
            cursor: pointer;
            transition: background-color .2s ease;
        }

        .dashboard-buttons button:hover,
        .logout-section button:hover {
            background-color: #a30000; /* Hover Crimson */
        }

        /* Hours Summary Box - Matched to Admin's "Current Admins" box */
        .hours-summary {
            background-color: #fafafa;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-top: 40px;
            margin-bottom: 80px;
            text-align: left; /* Better for lists */
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .hours-summary h2 {
            text-align: center;
            margin-top: 0;
            color: #333;
        }

        .total-hours-hero {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            color: #8b0000;
            margin: 10px 0 20px 0;
        }

        .hours-summary ul {
            list-style: none;
            padding: 0;
        }
        .hours-summary li {
            padding: 10px 0;
            font-size: 1.1em;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .hours-summary li:last-child { border-bottom: none; }
    </style>
</head>

<body>

<header>
    <div style="display: flex; align-items: center;">
        <img src="/images/cougar_mock-up.png" alt="WSU Logo">
        <h1 onclick="window.location.href='/'">Voiland Food Pantry</h1>
    </div>

    <div class="logout-section">
        <span>Logged in as: <span th:text="${name}"></span></span>
        <form action="/volunteer/logout" method="get">
            <button type="submit">Logout</button>
        </form>
    </div>
</header>

<div class="main-content">

    <div class="welcome-msg">
        Welcome, <span th:text="${name}"></span>!  
        Thank you for your service to the Voiland Food Pantry.
    </div>

    <div class="dashboard-buttons">
        <button onclick="window.location.href='/volunteer/hours'">Submit Hours</button>
        <button onclick="window.location.href='/inventory'">View Inventory</button>
        <button onclick="window.location.href='/'">Back to Home</button>
    </div>

    <div class="hours-summary">
        <h2>Your Hours Summary</h2>
        <div class="total-hours-hero">
            <span th:text="${totalHours}">0</span> Total Hours
        </div>
        
        <h3 style="font-size: 1em; color: #666; margin-bottom: 10px;">Recent Submissions</h3>
        <ul>
            <li th:each="entry : ${recentHours}">
                <span th:text="${entry.date}">2023-10-27</span>
                <strong th:text="${entry.hours} + ' hrs'">2.5 hrs</strong>
            </li>
            <li th:if="${#lists.isEmpty(recentHours)}" style="color: #999; justify-content: center;">
                No recent submissions found.
            </li>
        </ul>
    </div>

</div>

</body>
</html>
