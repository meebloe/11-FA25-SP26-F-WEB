<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Volunteer Hours - Voiland Food Pantry</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        /* Unified Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }
        header img { height: 80px; }
        header h1 { margin-left: 15px; cursor: pointer; }

        /* Login-style Card Container */
        .login-container {
            max-width: 450px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #fafafa;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-container h2 { margin-bottom: 5px; }
        
        .subtitle {
            display: block;
            margin-bottom: 25px;
            color: #666;
            font-size: 0.9em;
        }

        /* Form Controls Matched to Admin Login */
        .login-container label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        .login-container input {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #aaa;
            font-size: 16px;
        }

        /* Unified Crimson Button */
        .login-container button {
            width: 90%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #8b0000;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color .2s ease;
        }

        .login-container button:hover {
            background-color: #a30000;
        }

        /* Back Button Style */
        .back-button {
            display: block;
            width: 200px;
            margin: 25px auto 0 auto;
            padding: 10px;
            text-align: center;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #8b0000;
            color: white;
            text-decoration: none;
            cursor: pointer;
            transition: background-color .2s ease;
        }
        .back-button:hover { background-color: #a30000; }

        .success-message {
            margin-top: 15px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <div style="display: flex; align-items: center;">
        <img src="/images/cougar_mock-up.png" alt="WSU Logo">
        <h1 onclick="window.location.href='/'">Voiland Food Pantry</h1>
    </div>
</header>

<div class="login-container">
    <h2>Submit Hours</h2>
    <span class="subtitle">Logged in as: <strong th:text="${volunteerName}"></strong></span>

    <form method="post" action="/volunteer/hours">
        <label>Hours Worked</label>
        <input type="number" step="0.5" min="0" max="8" name="hours" placeholder="0.0" required>

        <label>Date</label>
        <input type="date" id="datePicker" name="date" required>

        <button type="submit">Submit Hours</button>
    </form>

    <p class="success-message" th:if="${message}" th:text="${message}"></p>
</div>

<div>
    <a href="/volunteer/dashboard" class="back-button">← Back to Dashboard</a>
</div>

<script>
    // Logic to restrict date picker to the last 2 weeks
    const dateInput = document.getElementById('datePicker');
    const today = new Date();
    
    // Calculate 14 days ago
    const twoWeeksAgo = new Date();
    twoWeeksAgo.setDate(today.getDate() - 14);

    // Format to YYYY-MM-DD for HTML input
    const formatDate = (date) => date.toISOString().split('T')[0];

    // Apply constraints
    dateInput.max = formatDate(today);       // Cannot pick future dates
    dateInput.min = formatDate(twoWeeksAgo); // Cannot pick dates older than 2 weeks
</script>

</body>
</html>
