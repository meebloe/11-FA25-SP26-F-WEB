<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Login - Voiland Food Pantry</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }
        header img { height: 80px; }
        header h1 { margin-left: 15px; cursor: pointer; }

        .login-container {
            max-width: 450px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #fafafa;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-container h2 { margin-bottom: 25px; }

        .login-container label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        .login-container input {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #aaa;
            font-size: 16px;
        }

        .login-container button {
            width: 90%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #8b0000;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color .2s ease;
        }

        .login-container button:hover { background-color: #a30000; }

        .register-link {
            margin-top: 20px;
            display: block;
            color: #8b0000;
            text-decoration: none;
            font-weight: bold;
        }
        .register-link:hover { text-decoration: underline; }

        .back-button {
            display: block;
            width: 200px;
            margin: 25px auto 0 auto;
            padding: 10px;
            text-align: center;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #8b0000;
            color: white;
            cursor: pointer;
            transition: background-color .2s ease;
        }
        .back-button:hover { background-color: #a30000; }

        .error-message { margin-top: 15px; color: red; text-align: center; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <img src="/images/cougar_mock-up.png" alt="WSU Logo">
        <h1 onclick="window.location.href='/'">Voiland Food Pantry</h1>
    </div>
</header>

<div class="login-container">
    <h2>Volunteer Login</h2>

    <form method="post" action="/volunteer/login">
        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Password:</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>

    <p class="error-message" th:if="${error}" th:text="${error}"></p>

    <a href="/volunteer/register" class="register-link">Create an account</a>
</div>

<div>
    <button class="back-button" onclick="window.location.href='/'">Back to Home</button>
</div>

</body>
</html>
